# ============================================
# ASSESSMENT-SERVICE - CONFIGURATION CENTRALISÉE
# ============================================

# ---------- SPRING ----------
spring.application.name=assessment-service

# ---------- SERVER ----------
server.port=8084
server.servlet.context-path=/api

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ---------- EUREKA ----------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ---------- ASSESSMENT SPECIFIC ----------
assessment.grading.default-max-score=20
assessment.grading.default-passing-score=10
assessment.grading.decimal-places=2
assessment.submission.late-penalty-percent=10
assessment.submission.max-late-days=7
assessment.submission.allowed-file-types=pdf,doc,docx,jpg,png,zip
assessment.submission.max-file-size=10MB
assessment.report.default-language=fr
assessment.report.timezone=Europe/Paris
assessment.features.auto-grading-enabled=true
assessment.features.plagiarism-detection-enabled=false
assessment.features.ai-feedback-enabled=false

# ---------- LOGGING ----------
logging.level.com.edueasy.assessment=DEBUG

# ---------- MANAGEMENT ----------
management.endpoints.web.exposure.include=health,info

# ---------- SWAGGER ----------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=true