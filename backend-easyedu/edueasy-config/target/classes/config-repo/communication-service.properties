# ============================================
# COMMUNICATION-SERVICE - CONFIGURATION CENTRALISÉE
# ============================================

# ---------- SPRING ----------
spring.application.name=communication-service

# ---------- SERVER ----------
server.port=8086
server.servlet.context-path=/api

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ---------- EUREKA ----------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ---------- WEBSOCKET ----------
spring.websocket.enabled=true
websocket.endpoint=/ws
websocket.allowed-origins=*

# ---------- EMAIL (SMTP) ----------
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ---------- EMAIL TEMPLATES ----------
spring.thymeleaf.prefix=classpath:/templates/email/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ---------- TWILIO SMS ----------
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.messaging-service-sid=${TWILIO_MESSAGING_SERVICE_SID}

# ---------- FIREBASE PUSH ----------
firebase.service-account.path=${FIREBASE_SERVICE_ACCOUNT_PATH}

# ---------- COMMUNICATION SPECIFIC ----------
communication.email.from-address=noreply@edueasy.com
communication.email.from-name=EduEasy
communication.email.batch-size=50
communication.sms.enabled=true
communication.sms.max-segments=5
communication.push.enabled=true
communication.notification.retention-days=90
communication.message.max-attachment-size=10MB
communication.message.allowed-file-types=pdf,doc,docx,jpg,png,mp4

# ---------- LOGGING ----------
logging.level.com.edueasy.communication=DEBUG
logging.level.org.springframework.mail=DEBUG

# ---------- MANAGEMENT ----------
management.endpoints.web.exposure.include=health,info

# ---------- SWAGGER ----------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=true