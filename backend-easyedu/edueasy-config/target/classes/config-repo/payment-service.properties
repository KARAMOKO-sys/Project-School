# ============================================
# PAYMENT-SERVICE - CONFIGURATION CENTRALISÉE
# ============================================

# ---------- SPRING ----------
spring.application.name=payment-service

# ---------- SERVER ----------
server.port=8087
server.servlet.context-path=/api

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ---------- EUREKA ----------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ---------- STRIPE ----------
stripe.api-key=${STRIPE_API_KEY:sk_test_xxx}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_xxx}
stripe.currency=EUR

# ---------- PAYPAL ----------
paypal.client-id=${PAYPAL_CLIENT_ID}
paypal.client-secret=${PAYPAL_CLIENT_SECRET}
paypal.mode=sandbox
paypal.currency=EUR

# ---------- MOBILE MONEY ----------
mobile-money.orange.enabled=true
mobile-money.orange.merchant-id=${ORANGE_MERCHANT_ID}
mobile-money.orange.api-key=${ORANGE_API_KEY}
mobile-money.mtn.enabled=true
mobile-money.mtn.user-id=${MTN_USER_ID}
mobile-money.mtn.api-key=${MTN_API_KEY}

# ---------- PAYMENT SPECIFIC ----------
payment.invoice.prefix=INV
payment.invoice.number-length=8
payment.invoice.due-days=30
payment.invoice.late-fee-percent=5
payment.invoice.late-fee-max=50
payment.receipt.enabled=true
payment.receipt.format=pdf
payment.refund.max-days=30
payment.refund.require-approval=true
payment.retry.max-attempts=3
payment.retry.delay-ms=5000

# ---------- LOGGING ----------
logging.level.com.edueasy.payment=DEBUG
logging.level.com.stripe=DEBUG

# ---------- MANAGEMENT ----------
management.endpoints.web.exposure.include=health,info

# ---------- SWAGGER ----------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=true