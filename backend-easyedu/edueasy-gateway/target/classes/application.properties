# edueasy-gateway/src/main/resources/application.properties

# ===== SPRING APPLICATION =====
spring.application.name=edueasy-gateway

# ===== SERVER =====
server.port=8080

# ===== EUREKA =====
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.registry-fetch-interval-seconds=5
eureka.instance.prefer-ip-address=true

# ===== DÉSACTIVER COMPLÈTEMENT LA SÉCURITÉ =====
spring.security.enabled=false
spring.security.basic.enabled=false
spring.security.oauth2.resourceserver.jwt.enabled=false

# ===== EXCLURE LES AUTO-CONFIGURATIONS DE SÉCURITÉ =====
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration

# ===== CORS =====
spring.cloud.gateway.globalcors.cors-configurations[/**].enabled=false

# ===== ROUTES =====

# ✅ Route 0: User Service - SANS RewritePath
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**

# ✅ Route 1: Course Service
spring.cloud.gateway.routes[1].id=course-service
spring.cloud.gateway.routes[1].uri=lb://course-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/courses/**

# ✅ Route 2: School Service
spring.cloud.gateway.routes[2].id=school-service
spring.cloud.gateway.routes[2].uri=lb://school-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/schools/**

# ===== REDIS =====
spring.data.redis.repositories.enabled=false

# ===== LOGGING =====
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG

# ===== MANAGEMENT =====
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true