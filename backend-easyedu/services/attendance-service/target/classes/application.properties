# ============================================
# ATTENDANCE-SERVICE - CONFIGURATION LOCALE
# ============================================

# ---------- DÉSACTIVER LA VÉRIFICATION DE COMPATIBILITÉ ----------
spring.cloud.compatibility-verifier.enabled=false

# ---------- DÉSACTIVER COMPLÈTEMENT LE CONFIG SERVER ----------
spring.cloud.config.enabled=false
spring.config.import=

# ---------- SPRING ----------
spring.application.name=attendance-service

# ---------- SERVER ----------
server.port=8085
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.error.include-message=always
server.error.include-binding-errors=always

# ---------- DATABASE ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/edueasy_attendance_db
spring.datasource.username=attendance_service_user
spring.datasource.password=attendance_pass_123
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ---------- EUREKA ----------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# ---------- ATTENDANCE SPECIFIC ----------
attendance.late-threshold-minutes=5
attendance.auto-mark-absent-after-minutes=30
attendance.notification.enabled=true
attendance.report.retention-days=90

# ---------- QR CODE ----------
qrcode.width=200
qrcode.height=200

# ---------- LOGGING ----------
logging.level.com.edueasy.attendance=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/attendance-service.log
logging.file.max-size=10MB
logging.file.max-history=30

# ---------- MANAGEMENT / ACTUATOR ----------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoints.web.base-path=/actuator
management.metrics.export.prometheus.enabled=true
management.tracing.sampling.probability=1.0

# ---------- SWAGGER ----------
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true

# ---------- SÉCURITÉ (désactivée pour le développement) ----------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ---------- PROFIL ----------
spring.profiles.active=dev