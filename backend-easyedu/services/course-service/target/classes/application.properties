# ============================================
# COURSE-SERVICE - CONFIGURATION LOCALE
# ============================================

# ---------- DÉSACTIVER COMPLÈTEMENT LE CONFIG SERVER ----------
spring.cloud.config.enabled=false
spring.config.import=

# ---------- SPRING ----------
spring.application.name=course-service

# ---------- SERVER ----------
server.port=8083
server.servlet.context-path=/api

# ---------- DATABASE ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/edueasy_course_db
spring.datasource.username=course_service_user
spring.datasource.password=course_pass_123
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------- HIKARICP ----------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ---------- EUREKA ----------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ---------- MINIO ----------
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=edueasy-courses

# ---------- FILE UPLOAD ----------
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ---------- FEIGN CLIENT ----------
user.service.url=http://localhost:8081/api
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000

# ---------- LOGGING ----------
logging.level.com.edueasy.course=DEBUG

# ---------- MANAGEMENT ----------
management.endpoints.web.exposure.include=health,info

# ---------- SWAGGER ----------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=true

# ---------- SÉCURITÉ (désactivée pour le développement) ----------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ---------- PROFIL ----------
spring.profiles.active=dev

