# ============================================
# SCHOOL-SERVICE - CONFIGURATION LOCALE
# ============================================

# ---------- DÉSACTIVER LA VÉRIFICATION DE COMPATIBILITÉ ----------
spring.cloud.compatibility-verifier.enabled=false

# ---------- DÉSACTIVER COMPLÈTEMENT LE CONFIG SERVER ----------
spring.cloud.config.enabled=false
spring.config.import=

# ---------- SPRING ----------
spring.application.name=school-service

# ---------- SERVER ----------
server.port=8082
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.error.include-message=always
server.error.include-binding-errors=always

# ---------- DATABASE ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/edueasy_school_db
spring.datasource.username=school_service_user
spring.datasource.password=school_pass_123
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ---------- EUREKA ----------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# ---------- FEIGN CLIENT ----------
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=basic

# ---------- RESILIENCE4J ----------
resilience4j.circuitbreaker.instances.user-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.user-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.user-service.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.user-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.retry.instances.user-service.max-attempts=3
resilience4j.retry.instances.user-service.wait-duration=1s

# ---------- USER SERVICE URL ----------
user-service.url=http://localhost:8081

# ---------- CACHE ----------
spring.cache.type=simple

# ---------- LOGGING ----------
logging.level.com.edueasy.school=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.engine.transaction=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/school-service.log
logging.file.max-size=10MB
logging.file.max-history=30

# ---------- MANAGEMENT / ACTUATOR ----------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.metrics.export.prometheus.enabled=true
management.tracing.sampling.probability=1.0

# ---------- SWAGGER ----------
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true

# ---------- SECURITY ----------
spring.security.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ---------- KAFKA ----------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=school-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=teacher.created:com.edueasy.common.event.TeacherCreatedEvent

# ---------- PROFIL ----------
spring.profiles.active=dev