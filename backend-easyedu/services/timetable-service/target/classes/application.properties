# ============================================
# TIMETABLE-SERVICE - CONFIGURATION LOCALE
# ============================================

# ---------- DÉSACTIVER LA VÉRIFICATION DE COMPATIBILITÉ SPRING CLOUD ----------
spring.cloud.compatibility-verifier.enabled=false

# ---------- DÉSACTIVER COMPLÈTEMENT LE CONFIG SERVER ----------
spring.cloud.config.enabled=false
spring.config.import=

# ---------- SPRING ----------
spring.application.name=timetable-service

# ---------- SERVER ----------
server.port=8088
server.servlet.context-path=/api

# ---------- DATABASE ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/edueasy_timetable_db
spring.datasource.username=timetable_service_user
spring.datasource.password=timetable_pass_123
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ---------- EUREKA ----------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ---------- OPTAPLANNER ----------
optaplanner.solver.termination.spent-limit=30s
optaplanner.solver.environment-mode=REPRODUCIBLE
optaplanner.solver.move-thread-count=AUTO

# ---------- TIMETABLE SPECIFIC ----------
timetable.time-slots=08:00-09:00,09:00-10:00,10:00-11:00,11:00-12:00,12:00-13:00,13:00-14:00,14:00-15:00,15:00-16:00,16:00-17:00,17:00-18:00
timetable.days=MONDAY,TUESDAY,WEDNESDAY,THURSDAY,FRIDAY
timetable.max-consecutive-hours=4
timetable.break-duration-minutes=15

# ---------- LOGGING ----------
logging.level.com.edueasy.timetable=DEBUG

# ---------- MANAGEMENT ----------
management.endpoints.web.exposure.include=health,info

# ---------- SWAGGER ----------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=true

# ---------- SÉCURITÉ (désactivée) ----------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ---------- PROFIL ----------
spring.profiles.active=dev