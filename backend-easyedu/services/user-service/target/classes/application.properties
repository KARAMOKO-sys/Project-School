# edueasy-services/services/user-service/src/main/resources/application.properties

# ========================================
# Désactiver Config Server
# ========================================
spring.cloud.config.enabled=false
spring.config.import=

# ========================================
# Application Configuration
# ========================================
spring.application.name=user-service
server.port=8081
server.servlet.context-path=/api

# ========================================
# DÉSACTIVER COMPLÈTEMENT LA SÉCURITÉ
# ========================================
spring.security.enabled=false
spring.security.basic.enabled=false
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ========================================
# Database Configuration
# ========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/edueasy_user_db
spring.datasource.username=user_service_user
spring.datasource.password=user_pass_123
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA Configuration
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ========================================
# JWT Configuration
# ========================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ========================================
# Admin Initialization
# ========================================
admin.init.enabled=true
admin.init.email=admin@edueasy.com
admin.init.password=Admin@123456
admin.init.first-name=Super
admin.init.last-name=Admin

# ========================================
# Logging Configuration
# ========================================
logging.level.com.edueasy.user=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================================
# Performance Configuration
# ========================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000

# ========================================
# Internationalisation
# ========================================
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8

# ========================================
# Jackson Configuration
# ========================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Europe/Paris
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ========================================
# Management/Actuator (optionnel)
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ========================================
# Swagger/OpenAPI Configuration
# ========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Chemins corrects (sans /api car le context-path est déjà /api)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Désactiver la configuration distante
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.url=/api/v3/api-docs
springdoc.swagger-ui.config-url=/api/v3/api-docs/swagger-config

# Options UI
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none

# Packages à scanner
springdoc.packages-to-scan=com.edueasy.user.controller
springdoc.paths-to-match=/**

# Cache
springdoc.cache.disabled=true