<section class="newsletter-section">
  <div class="container">
    <div class="row align-items-center g-5">
      <!-- Image Column -->
      <div class="col-md-6 col-lg-5 text-center text-md-start">
        <div class="image-wrapper">
          <img 
            [src]="imageUrl" 
            [alt]="imageAlt"
            class="newsletter-image"
            loading="lazy"
          />
          <div class="image-circle"></div>
        </div>
      </div>
      
      <!-- Form Column -->
      <div class="col-md-6 col-lg-7">
        <div class="content-wrapper">
          <div class="section-badge">
            <i class="fas fa-envelope me-2"></i>
            {{ subtitle }}
          </div>
          
          <h2 class="section-title">
            {{ title }}
          </h2>
          
          <p class="section-description">
            Stay updated with the latest courses, special offers, and exclusive content delivered straight to your inbox.
          </p>
          
          <form (ngSubmit)="onSubmit($event)" class="newsletter-form">
            <div class="form-group">
              <div class="input-wrapper">
                <i class="fas fa-envelope input-icon"></i>
                <input
                  type="email"
                  class="form-control"
                  [placeholder]="placeholder"
                  [(ngModel)]="email"
                  name="email"
                  required
                  [disabled]="isSubmitting"
                />
                <button 
                  type="submit" 
                  class="btn-subscribe"
                  [disabled]="isSubmitting"
                >
                  <span *ngIf="!isSubmitting">{{ buttonText }}</span>
                  <span *ngIf="isSubmitting">
                    <i class="fas fa-spinner fa-spin"></i>
                  </span>
                </button>
              </div>
            </div>
            
            <!-- Success Message -->
            <div *ngIf="showSuccess" class="alert alert-success alert-dismissible fade show mt-3">
              <i class="fas fa-check-circle me-2"></i>
              {{ errorText }}
              <button type="button" class="btn-close" (click)="showSuccess = false"></button>
            </div>
            
            <!-- Error Message -->
            <div *ngIf="showError" class="alert alert-danger alert-dismissible fade show mt-3">
              <i class="fas fa-exclamation-circle me-2"></i>
              {{ errorText }}
              <button type="button" class="btn-close" (click)="showError = false"></button>
            </div>
          </form>
          
          <div class="trust-badges">
            <div class="badge-item">
              <i class="fas fa-lock"></i>
              <span>Secure & Private</span>
            </div>
            <div class="badge-item">
              <i class="fas fa-bell"></i>
              <span>Weekly Updates</span>
            </div>
            <div class="badge-item">
              <i class="fas fa-gift"></i>
              <span>Exclusive Offers</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
