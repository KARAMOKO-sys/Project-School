<section class="statistics-section">
  <div class="bg-holder" [style.backgroundImage]="'url(' + backgroundImage + ')'">
    <div class="overlay"></div>
  </div>
  
  <div class="container">
    <div class="row g-4">
      <div class="col-sm-6 col-lg-3 text-center" *ngFor="let stat of statistics; let i = index">
        <div class="stat-card">
          <div class="icon-wrapper">
            <img 
              [src]="stat.icon" 
              [alt]="stat.label"
              class="stat-icon"
              loading="lazy"
            />
          </div>
          
          <div class="counter-wrapper">
            <h2 class="counter-number">
              {{ formatNumber(displayedValues[i]) }}
              <span *ngIf="stat.suffix" class="counter-suffix">{{ stat.suffix }}</span>
              <span *ngIf="stat.prefix" class="counter-prefix">{{ stat.prefix }}</span>
            </h2>
          </div>
          
          <p class="stat-label">{{ stat.label }}</p>
          
          <div class="stat-progress">
            <div class="progress-bar" [style.width.%]="(displayedValues[i] / stat.value) * 100"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
